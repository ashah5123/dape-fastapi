# DAPE Training Configuration
# Example configuration file for LoRA fine-tuning

# Model configuration
model_name_or_path: "microsoft/DialoGPT-small"  # Base model from Hugging Face
# Alternatives:
# - "TinyLlama/TinyLlama-1.1B-Chat-v1.0"  # Better quality, larger
# - "TheBloke/tiny-llama"  # Alternative tiny model

# Dataset configuration
dataset_path: "data/dataset.jsonl"

# Output configuration
output_dir: "runs/lora_adapter"

# Training hyperparameters
per_device_train_batch_size: 4
gradient_accumulation_steps: 4  # Effective batch size = 4 * 4 = 16
num_train_epochs: 3
learning_rate: 2e-4
max_length: 512

# LoRA configuration
lora_r: 16          # LoRA rank (higher = more parameters, more capacity)
lora_alpha: 32      # LoRA alpha scaling factor (typically 2x lora_r)
lora_dropout: 0.1   # Dropout for LoRA layers

# Precision (set one to true if GPU supports it)
bf16: false  # bfloat16 (better for modern GPUs like A100)
fp16: false  # float16 (wider GPU support)

# Device configuration
device_map: "auto"  # Options: "auto", "cpu", "cuda"

# Logging and saving
logging_steps: 10
save_steps: 500
save_total_limit: 2  # Keep only last 2 checkpoints
